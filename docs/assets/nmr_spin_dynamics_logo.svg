<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">NMRSpinDynamics logo</title>
  <desc id="desc">A spin precession orbit with RF pulse bars and an echo waveform beside the NMRSpinDynamics wordmark.</desc>
  <defs>
    <linearGradient id="orbitGrad" x1="58" y1="80" x2="280" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0077B6"/>
      <stop offset="0.55" stop-color="#18A999"/>
      <stop offset="1" stop-color="#D95F02"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B2430" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="1164" height="284" rx="32" fill="#F8FAFC"/>
  <rect x="18" y="18" width="1164" height="284" rx="32" fill="none" stroke="#D8E2EC" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <circle cx="160" cy="160" r="104" fill="#FFFFFF"/>
    <circle cx="160" cy="160" r="86" fill="none" stroke="#D8E2EC" stroke-width="9"/>
    <ellipse cx="160" cy="160" rx="97" ry="45" fill="none" stroke="url(#orbitGrad)" stroke-width="13" stroke-linecap="round" transform="rotate(-24 160 160)"/>
    <ellipse cx="160" cy="160" rx="96" ry="40" fill="none" stroke="#0077B6" stroke-width="5" stroke-linecap="round" stroke-opacity="0.35" transform="rotate(28 160 160)"/>
    <path d="M160 160 L226 102" fill="none" stroke="#1B2430" stroke-width="12" stroke-linecap="round"/>
    <path d="M160 160 L122 219" fill="none" stroke="#18A999" stroke-width="10" stroke-linecap="round"/>
    <circle cx="160" cy="160" r="13" fill="#1B2430"/>
    <circle cx="232" cy="95" r="13" fill="#D95F02"/>
    <path d="M75 236 C103 210 123 210 151 236 C179 262 201 262 229 236" fill="none" stroke="#D95F02" stroke-width="8" stroke-linecap="round"/>
    <rect x="64" y="78" width="12" height="70" rx="6" fill="#0077B6"/>
    <rect x="88" y="64" width="12" height="96" rx="6" fill="#18A999"/>
    <rect x="112" y="94" width="12" height="52" rx="6" fill="#D95F02"/>
  </g>

  <g>
    <text x="330" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="750" letter-spacing="0" fill="#1B2430">NMRSpinDynamics</text>
    <text x="333" y="191" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="500" letter-spacing="0" fill="#5B6472">spin-1/2 simulations in inhomogeneous fields</text>
    <g transform="translate(333 224)">
      <path d="M0 24 H118" stroke="#0077B6" stroke-width="8" stroke-linecap="round"/>
      <path d="M140 24 H258" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
      <path d="M280 24 H398" stroke="#D95F02" stroke-width="8" stroke-linecap="round"/>
      <text x="0" y="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#5B6472">MATLAB reference and Python port</text>
    </g>
  </g>
</svg>
