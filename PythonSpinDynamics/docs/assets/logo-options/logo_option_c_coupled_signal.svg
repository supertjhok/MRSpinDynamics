<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">PythonSpinDynamics logo option C: Coupled Signal</title>
  <desc id="desc">Two linked spin-1/2 sites with a J-coupling bridge and signal trace beside the PythonSpinDynamics wordmark.</desc>
  <defs>
    <linearGradient id="linkGrad" x1="88" y1="160" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0077B6"/>
      <stop offset="0.5" stop-color="#18A999"/>
      <stop offset="1" stop-color="#D95F02"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B2430" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="1164" height="284" rx="32" fill="#F8FAFC"/>
  <rect x="18" y="18" width="1164" height="284" rx="32" fill="none" stroke="#D8E2EC" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <circle cx="160" cy="160" r="108" fill="#FFFFFF"/>
    <path d="M99 160 C123 116 197 116 221 160 C197 204 123 204 99 160Z" fill="#F5F7FA" stroke="#D8E2EC" stroke-width="4"/>
    <path d="M102 160 C126 128 194 128 218 160 C194 192 126 192 102 160" fill="none" stroke="url(#linkGrad)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="102" cy="160" r="32" fill="#EAF4FB" stroke="#0077B6" stroke-width="8"/>
    <circle cx="218" cy="160" r="32" fill="#FFF2E8" stroke="#D95F02" stroke-width="8"/>
    <path d="M102 160 L78 118" stroke="#0077B6" stroke-width="9" stroke-linecap="round"/>
    <path d="M218 160 L247 123" stroke="#D95F02" stroke-width="9" stroke-linecap="round"/>
    <circle cx="102" cy="160" r="8" fill="#1B2430"/>
    <circle cx="218" cy="160" r="8" fill="#1B2430"/>
    <text x="147" y="151" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="800" fill="#18A999">J</text>
    <path d="M74 232 C99 208 122 208 147 232 C172 256 196 256 221 232 C238 216 249 216 264 228" fill="none" stroke="#1B2430" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <path d="M68 90 H108 M218 90 H258" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
    <path d="M88 70 V110 M238 70 V110" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g>
    <text x="330" y="138" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="750" letter-spacing="0" fill="#1B2430">PythonSpinDynamics</text>
    <text x="333" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="0" fill="#5B6472">Bloch isochromats meet small scalar-coupled spin systems</text>
    <g transform="translate(333 216)">
      <path d="M0 42 C38 9 76 9 114 42 C152 75 190 75 228 42 C266 9 304 9 342 42" fill="none" stroke="#1B2430" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
      <circle cx="0" cy="42" r="8" fill="#0077B6"/>
      <circle cx="114" cy="42" r="8" fill="#18A999"/>
      <circle cx="228" cy="42" r="8" fill="#D95F02"/>
      <circle cx="342" cy="42" r="8" fill="#0077B6"/>
      <text x="0" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#5B6472">Option C: Coupled Signal</text>
