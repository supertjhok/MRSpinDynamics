name: NQRDatabase

on:
  push:
    paths:
      - ".github/workflows/nqr-database.yml"
      - "NQRDatabase/**"
      - "References/NQR Data/**"
  pull_request:
    paths:
      - ".github/workflows/nqr-database.yml"
      - "NQRDatabase/**"
      - "References/NQR Data/**"

jobs:
  build:
    name: Build and validate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build dependencies
        run: python -m pip install pdfplumber
      - name: Rebuild database exports
        run: python NQRDatabase/scripts/build_database.py --output /tmp/nqr.sqlite
      - name: Validate generated artifacts
        run: python NQRDatabase/scripts/validate_database.py --database /tmp/nqr.sqlite
      - name: Check generated artifacts are current
        run: git diff --exit-code -- NQRDatabase/data/normalized
